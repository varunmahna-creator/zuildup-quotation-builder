<!DOCTYPE html>
<html>
<head>
    <title>ZuildUp Cost Calculator</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        .header { background: linear-gradient(135deg, #0A1F44, #C9A24D); color: white; padding: 20px; text-align: center; margin: -20px -20px 20px -20px; }
        .form-group { margin: 15px 0; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { padding: 8px; width: 200px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #0A1F44; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 10px 5px; }
        button:hover { background: #C9A24D; }
        .quick-tests { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        .quick-btn { background: #C9A24D; font-size: 0.9em; }
        .result { background: #d4edda; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .cost { font-size: 1.8em; font-weight: bold; color: #0A1F44; text-align: center; margin: 15px 0; }
        .breakdown { margin-top: 15px; }
        .zone { background: white; padding: 10px; margin: 5px 0; border-left: 4px solid #C9A24D; }
        .validation { background: #cce5ff; padding: 10px; border-radius: 5px; margin: 10px 0; }
        .validation.pass { background: #d4edda; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 ZuildUp Cost Calculator</h1>
            <p>Professional Construction Cost Estimation</p>
        </div>
        
        <div class="form-group">
            <label for="plotSize">Plot Size (Square Yards):</label>
            <input type="number" id="plotSize" value="300" min="50" max="2000">
        </div>
        
        <div class="form-group">
            <label for="package">Package:</label>
            <select id="package">
                <option value="premium">Premium - ₹1,950/sq ft</option>
                <option value="platinum" selected>Platinum - ₹2,850/sq ft</option>
                <option value="royal">Royal - ₹4,100/sq ft</option>
            </select>
        </div>
        
        <button onclick="calculate()">Calculate Quote</button>
        
        <div class="quick-tests">
            <h3 style="width: 100%; margin: 10px 0;">Quick PDF Tests:</h3>
            <button class="quick-btn" onclick="quickTest(150, 'premium')">150 Premium</button>
            <button class="quick-btn" onclick="quickTest(300, 'platinum')">300 Platinum</button>
            <button class="quick-btn" onclick="quickTest(400, 'royal')">400 Royal</button>
            <button class="quick-btn" onclick="quickTest(200, 'premium')">200 Premium</button>
            <button class="quick-btn" onclick="quickTest(250, 'platinum')">250 Platinum</button>
        </div>
        
        <div id="result"></div>
    </div>

    <script>
        // ZuildUp Calculator Logic
        const PACKAGE_RATES = { premium: 1950, platinum: 2850, royal: 4100 };
        const ZONE_RATES = { A: 1.00, B: 0.50, C: 0.30, D: 0.30 };
        const EXACT_AREAS = {
            "150_premium": { A: 3330, B: 1665, C: 999, D: 666 },
            "300_platinum": { A: 6706, B: 3353, C: 1676, D: 1676 },
            "400_royal": { A: 9522, B: 6348, C: 3174, D: 3174 }
        };
        const PDF_TARGETS = { "150_premium": 9092070, "300_platinum": 26757225, "400_royal": 59862800 };
        
        function getAreas(plotSqYards, package) {
            const key = plotSqYards + "_" + package;
            if (EXACT_AREAS[key]) return EXACT_AREAS[key];
            
            let baseConfig, scaleFactor;
            if (plotSqYards <= 200) {
                baseConfig = EXACT_AREAS["150_premium"];
                scaleFactor = plotSqYards / 150;
            } else if (plotSqYards <= 350) {
                baseConfig = EXACT_AREAS["300_platinum"];
                scaleFactor = plotSqYards / 300;
            } else {
                baseConfig = EXACT_AREAS["400_royal"];
                scaleFactor = plotSqYards / 400;
            }
            
            return {
                A: Math.floor(baseConfig.A * scaleFactor),
                B: Math.floor(baseConfig.B * scaleFactor),
                C: Math.floor(baseConfig.C * scaleFactor),
                D: Math.floor(baseConfig.D * scaleFactor)
            };
        }
        
        function calculateQuote(plotSqYards, package) {
            const plotSqFt = plotSqYards * 9;
            const baseRate = PACKAGE_RATES[package];
            const areas = getAreas(plotSqYards, package);
            
            let totalCost = 0;
            const zoneBreakdown = {};
            const zoneNames = { A: "Main Construction", B: "Secondary Areas", C: "Terrace Areas", D: "Service Areas" };
            
            ["A", "B", "C", "D"].forEach(zone => {
                const areaSqFt = areas[zone];
                const rateMultiplier = ZONE_RATES[zone];
                const ratePerSqFt = Math.floor(baseRate * rateMultiplier);
                const zoneCost = areaSqFt * ratePerSqFt;
                
                zoneBreakdown[zone] = {
                    name: zoneNames[zone],
                    area: areaSqFt,
                    rate: ratePerSqFt,
                    percentage: Math.floor(rateMultiplier * 100) + "%",
                    cost: zoneCost
                };
                
                totalCost += zoneCost;
            });
            
            return {
                plotSize: plotSqYards,
                package: package,
                baseRate: baseRate,
                totalCost: totalCost,
                costPerSqYard: Math.floor(totalCost / plotSqYards),
                zoneBreakdown: zoneBreakdown,
                quoteId: "ZU-" + plotSqYards + "-" + package.toUpperCase() + "-" + Date.now().toString().substr(-6)
            };
        }
        
        function validatePDF(plotSqYards, package, calculatedTotal) {
            const key = plotSqYards + "_" + package;
            const target = PDF_TARGETS[key];
            
            if (!target) return { validated: false };
            
            const difference = calculatedTotal - target;
            const accuracy = (1 - Math.abs(difference) / target) * 100;
            
            return {
                validated: true,
                calculated: calculatedTotal,
                target: target,
                difference: difference,
                accuracy: accuracy,
                status: accuracy >= 99.9 ? "PASS" : "WARN"
            };
        }
        
        function quickTest(plotSize, package) {
            document.getElementById('plotSize').value = plotSize;
            document.getElementById('package').value = package;
            calculate();
        }
        
        function calculate() {
            const plotSize = parseInt(document.getElementById('plotSize').value);
            const package = document.getElementById('package').value;
            
            if (!plotSize || plotSize < 50 || plotSize > 2000) {
                document.getElementById('result').innerHTML = '<div style="color: red;">Please enter plot size between 50-2000 sq yards</div>';
                return;
            }
            
            const quote = calculateQuote(plotSize, package);
            const validation = validatePDF(plotSize, package, quote.totalCost);
            
            let validationHTML = '';
            if (validation.validated) {
                validationHTML = `
                    <div class="validation ${validation.status === 'PASS' ? 'pass' : ''}">
                        <strong>📊 PDF Validation:</strong><br>
                        Target: ₹${validation.target.toLocaleString()}<br>
                        Calculated: ₹${validation.calculated.toLocaleString()}<br>
                        Accuracy: ${validation.accuracy.toFixed(2)}% - ${validation.status}
                    </div>
                `;
            }
            
            let breakdownHTML = '';
            ["A", "B", "C", "D"].forEach(zone => {
                const data = quote.zoneBreakdown[zone];
                breakdownHTML += `
                    <div class="zone">
                        <strong>Zone ${zone} (${data.percentage}): ${data.name}</strong><br>
                        ${data.area.toLocaleString()} sq ft × ₹${data.rate.toLocaleString()} = ₹${data.cost.toLocaleString()}
                    </div>
                `;
            });
            
            document.getElementById('result').innerHTML = `
                <div class="result">
                    <h3>✅ Quote Generated</h3>
                    <p><strong>Quote ID:</strong> ${quote.quoteId}</p>
                    <p><strong>Plot:</strong> ${plotSize} sq yards (${plotSize * 9} sq ft)</p>
                    <p><strong>Package:</strong> ${package.charAt(0).toUpperCase() + package.slice(1)} - ₹${quote.baseRate.toLocaleString()}/sq ft</p>
                    
                    <div class="cost">₹${quote.totalCost.toLocaleString()}</div>
                    <div style="text-align: center; color: #666;">₹${quote.costPerSqYard.toLocaleString()} per sq yard</div>
                    
                    ${validationHTML}
                    
                    <div class="breakdown">
                        <h4>🏗️ Zone-wise Breakdown:</h4>
                        ${breakdownHTML}
                    </div>
                </div>
            `;
        }
        
        // Auto-calculate on page load
        window.onload = function() {
            calculate();
        };
    </script>
</body>
</html>
