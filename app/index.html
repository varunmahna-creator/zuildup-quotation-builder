<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ZuildUp Quotation Builder</title>
<meta name="viewport" content="width=1280">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0A1F44; --gold:#C9A24D; --offwhite:#F9FAF7;
  --ink:#1B1F2A; --muted:#5C6373; --rule:rgba(10,31,68,0.10);
  --bg:#F0F2F5;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; color: var(--ink); background: var(--bg); height: 100%; }
body { display: grid; grid-template-columns: 510px 1fr; height: 100vh; }
.left { background: white; border-right: 1px solid var(--rule); overflow-y: auto; padding: 26px 26px 80px; }
.right { background: var(--bg); overflow-y: auto; }

/* Header */
.brand { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
.brand svg { height: 26px; width: auto; }
.brand .name { font-family: 'Fraunces', serif; font-weight: 600; font-size: 19px; color: var(--navy); letter-spacing: -0.01em; }
.brand .tag { color: var(--muted); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; margin-left: auto; }

/* Form */
fieldset { border: none; margin: 0 0 20px; padding: 0; }
legend { font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); font-weight: 600; padding: 0; margin-bottom: 10px; }
label { display: block; font-size: 11.5px; color: var(--muted); margin: 0 0 4px; font-weight: 500; }
input[type=text], input[type=number], select, textarea {
  width: 100%; padding: 9px 11px; border: 1px solid var(--rule); border-radius: 7px;
  font: inherit; font-size: 13px; color: var(--ink); background: white; outline: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(10,31,68,0.08); }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.full { margin-bottom: 10px; }
.checkrow { display: flex; gap: 16px; padding: 4px 0 6px; }
.checkrow label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink); cursor: pointer; }
.checkrow input { width: auto; }
textarea { resize: vertical; min-height: 60px; }

/* Toggle pills */
.toggle { display: inline-flex; background: white; border: 1px solid var(--rule); border-radius: 7px; padding: 3px; gap: 0; }
.toggle button { font: inherit; font-size: 11.5px; padding: 6px 12px; border: 0; background: transparent; cursor: pointer; border-radius: 5px; color: var(--muted); }
.toggle button.active { background: var(--navy); color: white; }

/* Specs */
.specs-head { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
.specs-head .count { font-size: 11px; color: var(--muted); }
.specs-head .actions button { font: inherit; font-size: 11px; padding: 6px 11px; border: 1px solid var(--rule); background: white; border-radius: 6px; cursor: pointer; color: var(--ink); margin-left: 6px; }
.specs-head .actions button:hover { border-color: var(--navy); }
.specs-head .actions button.primary { background: var(--navy); color: white; border-color: var(--navy); }
.specs-head .actions button.primary:hover { background: #13315A; }
.spec-list { margin-top: 10px; }
.spec { border: 1px solid var(--rule); border-radius: 7px; padding: 9px 11px; margin-bottom: 6px; background: white; display: grid; grid-template-columns: 16px 1fr auto auto; gap: 8px; align-items: center; }
.spec.custom { border-left: 3px solid var(--gold); }
.spec .grip { color: var(--muted); cursor: grab; font-size: 12px; user-select: none; text-align: center; }
.spec .head { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.spec .label { font-weight: 600; font-size: 12.5px; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.spec .label .loc { color: var(--gold); font-weight: 500; font-size: 11.5px; }
.spec .meta { font-size: 10.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.spec .rate { font-size: 11.5px; color: var(--ink); font-variant-numeric: tabular-nums; white-space: nowrap; }
.spec .meta .suggest, .spec .rate .set-rate { font-style: italic; color: var(--muted); opacity: 0.75; }
.spec .row-actions { display: flex; gap: 6px; }
.spec .row-actions span { color: var(--muted); cursor: pointer; font-size: 13px; padding: 0 3px; user-select: none; line-height: 1; }
.spec .row-actions .x:hover { color: #c0392b; }
.spec .row-actions .dup:hover { color: var(--navy); }
.spec.editing { padding: 12px; }
.spec.editing .editor { grid-column: 1/-1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--rule); }
.spec.editing .editor .full { grid-column: 1/-1; }
.spec.editing .editor input, .spec.editing .editor textarea, .spec.editing .editor select { font-size: 12px; padding: 6px 8px; }
.spec.editing .editor label { font-size: 10.5px; }
.ed-actions { grid-column: 1/-1; display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
.ed-actions button { font: inherit; font-size: 11.5px; padding: 6px 14px; border: 1px solid var(--rule); border-radius: 6px; background: white; cursor: pointer; color: var(--ink); }
.ed-actions .btn-primary { background: var(--navy); color: white; border-color: var(--navy); }
.ed-actions .btn-danger { color: #c0392b; border-color: #f0d2d0; }

/* Notes */
.notes-counter { font-size: 10.5px; color: var(--muted); text-align: right; margin-top: 4px; font-variant-numeric: tabular-nums; }

/* Picker dialog */
.picker { display: none; position: fixed; inset: 0; background: rgba(10,31,68,0.35); z-index: 100; align-items: flex-start; justify-content: center; padding-top: 8vh; }
.picker.open { display: flex; }
.picker .panel { background: white; width: 720px; max-width: 90vw; max-height: 80vh; border-radius: 12px; box-shadow: 0 12px 48px rgba(0,0,0,0.18); overflow: hidden; display: flex; flex-direction: column; }
.picker .panel header { padding: 14px 18px; border-bottom: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.picker .panel header h3 { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 500; margin: 0; color: var(--navy); }
.picker .panel header input { width: 240px; }
.picker .panel .body { flex: 1; overflow-y: auto; padding: 8px 12px; }
.picker .panel .item { padding: 10px 12px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.picker .panel .item:hover { background: rgba(10,31,68,0.04); }
.picker .panel .item .l { font-size: 12.5px; min-width: 0; }
.picker .panel .item .l .lab { font-weight: 600; color: var(--navy); }
.picker .panel .item .l .cat { font-size: 10px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }
.picker .panel .item .r { font-size: 11.5px; color: var(--muted); white-space: nowrap; }
.picker .panel footer { padding: 9px 18px; border-top: 1px solid var(--rule); text-align: right; }
.picker .panel footer button { font: inherit; padding: 7px 14px; border: 1px solid var(--rule); border-radius: 6px; background: white; cursor: pointer; }

/* Right preview pane */
.right .toolbar {
  position: sticky; top: 0; background: rgba(240,242,245,0.95); backdrop-filter: blur(6px);
  padding: 10px 22px; border-bottom: 1px solid var(--rule); z-index: 10;
  display: flex; justify-content: space-between; align-items: center;
}
.right .toolbar .title { font-size: 11.5px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }
.right .toolbar .download { background: var(--navy); color: white; border: none; padding: 9px 18px; border-radius: 6px; font: inherit; font-weight: 500; font-size: 13px; cursor: pointer; letter-spacing: 0.02em; }
.right .toolbar .download:disabled { opacity: 0.5; cursor: not-allowed; }
.right .toolbar .download:hover:not(:disabled) { background: #13315A; }
/* P1.4: secondary toolbar button + unedited rows + counter */
.right .toolbar .secondary { background: white; color: var(--navy); border: 1px solid var(--rule); padding: 8px 14px; border-radius: 6px; font: inherit; font-weight: 500; font-size: 12.5px; cursor: pointer; margin-right: 8px; }
.right .toolbar .secondary:hover { background: rgba(10,31,68,0.04); border-color: rgba(10,31,68,0.30); }
.right .toolbar > span.title { margin-right: auto; }
.spec.unedited { background: rgba(10,31,68,0.025); border-style: dashed; }
.spec.unedited .label { color: rgba(10,31,68,0.70); }
.spec.unedited .meta, .spec.unedited .rate { opacity: 0.85; }
.spec:focus { outline: 2px solid rgba(10,31,68,0.35); outline-offset: 1px; }
.specs-head .count .needs-rate { color: #B8860B; font-weight: 500; }
.specs-head .count .ok { color: #2E7D32; font-weight: 500; }
.preview-stack { padding: 16px 0 60px; }
iframe.preview { width: 794px; border: none; display: block; height: 1123px; margin: 0 auto; background: white; box-shadow: 0 6px 28px rgba(0,0,0,0.10); }
</style>
</head>
<body>

<aside class="left">

  <div class="brand">
    <svg viewBox="0 0 114 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 21V13C15 12.7348 14.8946 12.4804 14.7071 12.2929C14.5196 12.1054 14.2652 12 14 12H10C9.73478 12 9.48043 12.1054 9.29289 12.2929C9.10536 12.4804 9 12.7348 9 13V21" stroke="#C9A24D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M3 10C2.99993 9.71 3.063 9.422 3.186 9.158C3.308 8.894 3.487 8.66 3.709 8.472L10.709 2.472C11.07 2.167 11.527 2 12 2C12.473 2 12.93 2.167 13.291 2.472L20.291 8.472C20.513 8.66 20.692 8.894 20.814 9.158C20.937 9.422 21 9.71 21 10V19C21 19.531 20.789 20.04 20.414 20.415C20.039 20.79 19.53 21 19 21H5C4.47 21 3.961 20.79 3.586 20.415C3.211 20.04 3 19.531 3 19V10Z" stroke="#C9A24D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="28" y="17" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0A1F44" letter-spacing="0.5">ZuildUp</text>
    </svg>
    <span class="name">Quotation Builder</span>
    <span class="tag">Internal · v2</span>
  </div>

  <fieldset>
    <legend>Customer</legend>
    <div class="row">
      <div><label>Salutation</label>
        <select id="f-salutation">
          <option value=""></option>
          <option>Mr.</option><option>Ms.</option><option>Mr. & Mrs.</option><option>Dr.</option>
        </select>
      </div>
      <div><label>Full name</label><input id="f-name" type="text" placeholder="e.g. Aanya Kapoor"></div>
    </div>
    <div class="full"><label>Plot address</label><textarea id="f-address" rows="2" placeholder="Plot 14, Sector 47, Gurugram, Haryana 122001"></textarea></div>
  </fieldset>

  <fieldset>
    <legend>Build Configuration</legend>
    <div class="row cols-3">
      <div><label>Plot (sq.yd)</label><input id="f-plot" type="number" min="50" step="10"></div>
      <div><label>Breadth (ft)</label><input id="f-breadth" type="number" min="10" step="0.5"></div>
      <div><label>Coverage (%)</label><input id="f-coverage" type="number" min="0" max="100"></div>
    </div>
    <div class="row">
      <div><label>Build Type</label>
        <select id="f-build-type">
          <option value="stilt">Stilt + N Floors (recommended)</option>
          <option value="nostilt">Ground + N (No Stilt)</option>
          <option value="structure">Structure Only</option>
        </select>
      </div>
      <div><label id="floors-label">Floors above stilt</label><input id="f-floors" type="number" min="1" max="6"></div>
    </div>
    <div class="checkrow">
      <label><input id="f-basement" type="checkbox"> Basement</label>
      <label><input id="f-lift" type="checkbox"> Lift</label>
    </div>
    <div>
      <label>Scope</label>
      <div class="toggle" id="f-scope">
        <button data-v="full" class="active">Full Build</button>
        <button data-v="structure_only">Structure Only</button>
      </div>
    </div>
  </fieldset>

  <fieldset>
    <legend>Pricing</legend>
    <div class="full" id="cost-sqft-row">
      <label>Cost per sqft (Zone A) — ₹</label>
      <input id="f-cost-sqft" type="number" min="0" placeholder="e.g. 2,850">
    </div>
    <div class="full" id="struct-rate-row" style="display:none;">
      <label>Structure rate per sqft — ₹</label>
      <input id="f-struct-rate" type="number" min="0" placeholder="e.g. 1,250">
    </div>
    <p style="font-size:10.5px;color:var(--muted);line-height:1.5;margin:0;">GST and any liaisoning are quoted separately outside this document.</p>
  </fieldset>

  <fieldset>
    <legend>Specifications</legend>
    <div class="specs-head">
      <span class="count" id="spec-count">— items</span>
      <span class="actions">
        <button id="reset-default" title="Reset to scope default">Reset</button>
        <button id="add-custom">+ Custom</button>
        <button id="add-row" class="primary">+ From Catalog</button>
      </span>
    </div>
    <div class="spec-list" id="spec-list"></div>
  </fieldset>

  <fieldset>
    <legend>Notes (internal)</legend>
    <textarea id="f-notes" rows="4" maxlength="2000" placeholder="Caveats, observations, special asks from the customer…"></textarea>
    <div class="notes-counter" id="notes-count">0/2000</div>
  </fieldset>

</aside>

<main class="right">
  <div class="toolbar">
    <span class="title">Live Preview · A4</span>
    <button class="secondary" id="new-quote" title="Clear current quote and start fresh">New Quote</button>
    <button class="download" id="dl">Download PDF</button>
  </div>
  <div class="preview-stack">
    <iframe class="preview" id="preview" src="/preview" title="quote preview"></iframe>
  </div>
</main>

<!-- Picker dialog -->
<div class="picker" id="picker" role="dialog" aria-label="Add row">
  <div class="panel">
    <header>
      <h3>Add line item from catalog</h3>
      <input type="text" id="picker-search" placeholder="Search by label or category…" autofocus>
    </header>
    <div class="body" id="picker-body"></div>
    <footer><button id="picker-close">Close</button></footer>
  </div>
</div>

<script src="/app/quote.js"></script>
</body>
</html>
